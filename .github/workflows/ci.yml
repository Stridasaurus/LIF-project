name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Editable install of the shared simulation engine.
          pip install -e ./lif_core
          # Backend + test dependencies.
          pip install "fastapi>=0.110" "uvicorn[standard]>=0.29" "pydantic>=2.6" "pytest>=7" "httpx>=0.27"

      - name: Run tests
        run: pytest lif_core/tests web-app/backend/tests -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run frontend smoke tests
        run: npx playwright test
